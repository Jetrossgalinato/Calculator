<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Calculator</title>
  </head>
  <body>
    <!-- Parent Container -->
    <div class="flex items-center justify-center min-h-screen">
      <!-- Outer Card -->
      <div
        class="w-[50%] lg:w-[30%] border border-black bg-gray-900 rounded-xl py-8 px-6 shadow-xl"
      >
        <!-- Output Section -->
        <div class="border border-black bg-gray-400 p-8 mb-8 mx-6 relative">
          <div class="absolute right-4 bottom-2 text-3xl">0.</div>
        </div>
        <!-- Buttons Section -->
        <div class="w-full border-t-4 border-gray-500 bg-gray-900 pt-4">
          <div class="grid grid-cols-4 gap-4">
            <!-- Delete Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold text-blue-500 p-4 cursor-pointer text-white bg-rose-500 hover:bg-rose-600"
            >
              <i data-lucide="delete"></i>
            </div>
            <!-- Clear Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold text-blue-500 p-4 cursor-pointer text-white bg-rose-500 hover:bg-rose-600"
            >
              C
            </div>
            <!-- Percent Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold text-blue-500 p-4 cursor-pointer text-white bg-rose-500 hover:bg-rose-600"
            >
              %
            </div>
            <!-- Slash Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold text-red-500 p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
            >
              /
            </div>
            <!-- Button 7 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              7
            </div>
            <!-- Button 8 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              8
            </div>
            <!-- Button 9 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              9
            </div>
            <!-- Multiply Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
            >
              <i data-lucide="x"></i>
            </div>
            <!-- Button 4 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              4
            </div>
            <!-- Button 5 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              5
            </div>
            <!-- Button 6 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              6
            </div>
            <!-- Subtract Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
            >
              <i data-lucide="minus"></i>
            </div>
            <!-- Button 1 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              1
            </div>
            <!-- Button 2 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              2
            </div>
            <!-- Button 3 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              3
            </div>
            <!-- Divide Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
            >
              <i data-lucide="divide"></i>
            </div>
            <!-- Button . -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              .
            </div>
            <!-- Button 0 -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              0
            </div>
            <!-- Button = -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
            >
              =
            </div>
            <!-- Add Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-gray-600"
            >
              <i data-lucide="plus"></i>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
