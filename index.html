<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <title>Calculator</title>
  </head>
  <body>
    <!-- Parent Container -->
    <div class="flex items-center justify-center min-h-screen">
      <!-- Outer Card -->
      <div
        class="w-[50%] lg:w-[30%] border border-black bg-gray-900 rounded-xl py-8 px-6 shadow-xl"
      >
        <!-- Output Section -->
        <div class="border border-black bg-gray-400 p-8 mb-8 mx-6 relative">
          <div class="absolute right-4 bottom-2 text-3xl">
            <div id="output"></div>
          </div>
        </div>
        <!-- Buttons Section -->
        <div class="w-full border-t-4 border-gray-500 bg-gray-900 pt-4">
          <div class="grid grid-cols-4 gap-4">
            <!-- Delete Button -->
            <div
              class="flex justify-center border border-black rounded-lg font-semibold text-blue-500 p-4 cursor-pointer text-white bg-rose-500 hover:bg-rose-600"
            >
              <i data-lucide="delete"></i>
            </div>

            <!-- Clear Button -->
            <button id="clear">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold text-blue-500 p-4 cursor-pointer text-white bg-rose-500 hover:bg-rose-600"
              >
                C
              </div>
            </button>

            <!-- Modulo Button -->
            <button id="modulo">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold text-blue-500 p-4 cursor-pointer text-white bg-rose-500 hover:bg-rose-600"
              >
                %
              </div>
            </button>

            <!-- Multiply Button -->
            <button id="multiply">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
              >
                <i data-lucide="x"></i>
              </div>
            </button>

            <!-- Button 7 -->
            <button id="button7">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                7
              </div>
            </button>

            <!-- Button 8 -->
            <button id="button8">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                8
              </div>
            </button>

            <!-- Button 9 -->
            <button id="button9">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                9
              </div>
            </button>

            <!-- Subtract Button -->
            <button id="subtract">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
              >
                <i data-lucide="minus"></i>
              </div>
            </button>

            <!-- Button 4 -->
            <button id="button4">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                4
              </div>
            </button>

            <!-- Button 5 -->
            <button id="button5">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                5
              </div>
            </button>

            <!-- Button 6 -->
            <button id="button6">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                6
              </div>
            </button>

            <!-- Divide Button -->
            <button id="divide">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
              >
                <i data-lucide="divide"></i>
              </div>
            </button>

            <!-- Button 1 -->
            <button id="button1">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                1
              </div>
            </button>

            <!-- Button 2 -->
            <button id="button2">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                2
              </div>
            </button>

            <!-- Button 3 -->
            <button id="button3">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                3
              </div>
            </button>

            <!-- Add Button -->
            <button id="add">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
              >
                <i data-lucide="plus"></i>
              </div>
            </button>

            <!-- Double Zero Button -->
            <button id="double">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                00
              </div>
            </button>

            <!-- Button 0 -->
            <button id="button0">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                0
              </div>
            </button>
            <!-- Button . -->
            <button id="button.">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-gray-500 hover:bg-gray-600"
              >
                .
              </div>
            </button>

            <!-- Button = -->
            <button id="equals">
              <div
                class="flex justify-center border border-black rounded-lg font-semibold p-4 cursor-pointer text-white bg-teal-500 hover:bg-teal-600"
              >
                =
              </div>
            </button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
